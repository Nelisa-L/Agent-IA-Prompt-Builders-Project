AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Auditor-Agent — API serverless (Lambda + API Gateway) para auditar
  código Python en busca de problemas de seguridad y linting.

Globals:
  Function:
    Timeout: 15
    MemorySize: 256
    Runtime: python3.11

Resources:
  AuditorAgentFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ..
      Handler: infra.lambda_handler.handler
      Events:
        AnyApi:
          Type: Api
          Properties:
            Path: /{proxy+}
            Method: ANY
        RootApi:
          Type: Api
          Properties:
            Path: /
            Method: ANY

Outputs:
  ApiUrl:
    Description: URL pública de la API (usar como "demo en línea")
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/"
